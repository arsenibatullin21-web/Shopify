{% extends 'main/base.html' %}
{% load static %}

{% block title %}Delete{% endblock %}


{% block content %}
 <section class="apx-add-product-page">
        <div class="container">
            <div class="apx-add-product-wrapper">
                 <div class="apx-add-product-header">
                    <span class="apx-add-product-badge">Admin Panel</span>
                    <h1 class="apx-add-product-title">Delete Product</h1>
                    <p class="apx-add-product-subtitle">
                        Press Delete, if you want to delete product
                    </p>
                </div>
                <form class="apx-add-product-form" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                     <img src="{{ product.image.url }}" alt="" style="width: 300px; height: 300px;">
                     <div class="mt-3">
                        <button type="reset" class="apx-btn apx-btn-secondary"><a href="{% url 'main:product_detail' product.slug %}">Reset</a> </button>
                        <button type="submit" class="apx-btn apx-btn-primary">Delete</button>
                    </div>
                </form>
            </div>
        <div>
 </section>
{% endblock %}
